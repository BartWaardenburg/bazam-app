services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bazam
      POSTGRES_USER: bazam
      POSTGRES_PASSWORD: bazam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazam"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://bazam:bazam@postgres:5432/bazam

volumes:
  postgres_data:
