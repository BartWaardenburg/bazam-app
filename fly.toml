app = "bazam-app"
primary_region = "ams"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    type = "http"
    port = 3001
    path = "/health"
    interval = "30s"
    timeout = "5s"
